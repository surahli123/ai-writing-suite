name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    name: regression checks (stdlib-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run all v1 checks
        run: bash skills/ai-writing-suite/evals/run_all.sh
